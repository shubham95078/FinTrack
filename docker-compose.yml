services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - fintrack_db:/app/backend/instance

  frontend:
    build:
      context: ./frontend
      args:
        # Use localhost so the browser can resolve it.
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/entries}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  fintrack_db:

